name: Build Osprey firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    name: Fetch Build Matrix
    outputs:
      build_matrix: ${{ steps.set-matrix.outputs.build_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yaml2json
        run: python3 -m pip install remarshal

      - name: Fetch Build Matrix
        id: set-matrix
        run: |
          echo "build_matrix=$(yaml2json build.yaml | jq -c .)" >> "$GITHUB_OUTPUT"
          yaml2json build.yaml | jq

  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    needs: matrix
    name: Build
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.build_matrix) }}

    steps:
      - name: Prepare variables
        shell: sh
        run: |
          if [ -n "${{ matrix.shield }}" ]; then
            echo "extra_cmake_args=-DSHIELD=${{ matrix.shield }}" >> "$GITHUB_ENV"
            echo "artifact_name=${{ matrix.shield }}-${{ matrix.board }}-zmk" >> "$GITHUB_ENV"
            echo "display_name=${{ matrix.shield }} - ${{ matrix.board }}" >> "$GITHUB_ENV"
          else
            echo "extra_cmake_args=" >> "$GITHUB_ENV"
            echo "artifact_name=${{ matrix.board }}-zmk" >> "$GITHUB_ENV"
            echo "display_name=${{ matrix.board }}" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-zmk-${{ hashFiles('config/west.yml', 'build.yaml') }}
          restore-keys: |
            ${{ runner.os }}-zmk-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update --fetch-opt=--filter=tree:0

      - name: West Zephyr export
        run: west zephyr-export

      - name: West Build (${{ env.display_name }})
        shell: sh -x {0}
        run: |
          west build -s zmk/app -d build -b ${{ matrix.board }} -- \
            -DZMK_CONFIG=${GITHUB_WORKSPACE}/config \
            ${{ env.extra_cmake_args }} \
            ${{ matrix.cmake-args }}

      - name: Show Kconfig
        run: grep -v -e "^#" -e "^$" build/zephyr/.config | sort

      - name: Prepare artifacts
        shell: sh -x {0}
        run: |
          mkdir -p build/artifacts
          if [ -f build/zephyr/zmk.uf2 ]; then
            cp build/zephyr/zmk.uf2 "build/artifacts/${{ env.artifact_name }}.uf2"
          elif [ -f build/zephyr/zmk.bin ]; then
            cp build/zephyr/zmk.bin "build/artifacts/${{ env.artifact_name }}.bin"
          elif [ -f build/zephyr/zmk.hex ]; then
            cp build/zephyr/zmk.hex "build/artifacts/${{ env.artifact_name }}.hex"
          else
            echo "No firmware artifact found."
            ls -R build/zephyr || true
            exit 1
          fi

      - name: Upload artifacts (${{ env.display_name }})
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/artifacts
